services:
  postgres:
    image: postgres:16
    container_name: flinggolf-postgres
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: flinggolf-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: flinggolf_backend.settings
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,13.42.234.239,18.171.11.49,flinggolfclub.com,www.flinggolfclub.com"
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend:/app
    command: ["/entrypoint.sh"]
volumes:
  pg_data:
